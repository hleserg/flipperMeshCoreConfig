; Transparent USB<->UART bridge for the Flipper WiFi Devboard (ESP32-S2).
;
; Build and flash:
;     pio run -t upload
;
; The board enumerates as a USB CDC port; PlatformIO finds it on its own. If it
; does not, hold BOOT, tap RESET, and try again — that puts the ESP32-S2 into
; its ROM download mode, which always enumerates (as VID 303A, PID 0002).
;
; Flashing from download mode ends like this, and it is not a failure:
;
;     Hash of data verified.
;     WARNING: ... chip was placed into download mode using GPIO0.
;     esptool.py can not exit the download mode over USB.
;     *** [upload] Error 1
;
; The write is already verified. esptool exits non-zero because the S2 has no
; auto-reset circuit on its native USB — there are no DTR/RTS lines to pull. Tap
; RESET by hand and the board comes up running the bridge.

[env:devboard]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
monitor_speed = 115200

build_flags =
    ; The S2 has native USB, and we want Serial to *be* that USB port rather
    ; than a hardware UART — the whole point is USB in, UART out.
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=0
    ; Pins toward the Flipper's GPIO header, taken from the devboard's own
    ; firmware (blackmagic-esp32-s2, main/cli/cli-commands-gpio.c), which names
    ; GPIO17 "CLI_TXD" and GPIO18 "CLI_RXD". Overridable if a board differs.
    -D BRIDGE_TX_PIN=17
    -D BRIDGE_RX_PIN=18
    -D BRIDGE_BAUD=115200
