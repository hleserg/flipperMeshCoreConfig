<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-label="Главное меню приложения">
  <style>
    .lcd{fill:#ff9a1f}
    .px{fill:#1a1205;font-family:ui-monospace,Menlo,Consolas,monospace}
    .inv{fill:#1a1205}
    .invtxt{fill:#ff9a1f;font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700}
    .ann{fill:#8fa39b;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px}
    .lead{stroke:#5ef2a4;stroke-width:1.5;fill:none}
    .dot{fill:#5ef2a4}
  </style>
  <rect width="520" height="300" fill="#120e05"/>

  <rect x="26" y="28" width="276" height="156" rx="8" fill="#2a2113"/>
  <rect class="lcd" x="34" y="36" width="256" height="128"/>

  <text class="px" x="42" y="52" font-size="11" font-weight="700">MeshCore Config</text>
  <line x1="34" y1="58" x2="290" y2="58" stroke="#1a1205" stroke-width="1"/>

  <!-- selected row is inverted, the classic Flipper look -->
  <rect class="inv" x="34" y="62" width="256" height="18"/>
  <text class="invtxt" x="42" y="76" font-size="13">Connect</text>

  <text class="px" x="42" y="94" font-size="13">Messenger</text>
  <text class="px" x="42" y="112" font-size="13">Logger</text>
  <text class="px" x="42" y="130" font-size="13">Presets</text>
  <text class="px" x="42" y="148" font-size="13">Serial log</text>

  <text class="ann" x="26" y="204">Выделенная строка инвертирована — обычный флипперский стиль</text>

  <line class="lead" x1="300" y1="71" x2="352" y2="71"/><circle class="dot" cx="300" cy="71" r="3"/>
  <text class="ann" x="358" y="75">начни отсюда</text>

  <line class="lead" x1="300" y1="108" x2="352" y2="108"/><circle class="dot" cx="300" cy="108" r="3"/>
  <text class="ann" x="358" y="112">полевой лог на SD</text>

  <line class="lead" x1="300" y1="145" x2="352" y2="145"/><circle class="dot" cx="300" cy="145" r="3"/>
  <text class="ann" x="358" y="149">сырой обмен байтами —</text>
  <text class="ann" x="358" y="165">сюда при проблемах</text>

  <text class="ann" x="26" y="236">↑↓ — выбор.  OK — войти.  Back — выйти из приложения.</text>
</svg>
